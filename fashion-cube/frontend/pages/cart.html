<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart - FASHION CUBE</title>
</head>
<body>
    <div id="cart" class="page">
        <button class="btn-back" id="cartBack">
            <i class="fas fa-arrow-left"></i> Back to shop
        </button>
        <h2 style="margin: 1rem 0;">Your Cart</h2>
        
        <div id="cartItems" class="cart-items">
            <!-- Generated by JS -->
        </div>
        <div id="cartEmpty" style="text-align: center; padding: 3rem; color: #999;">
            Your cart is empty.
            <br>
            <a href="#" data-page="products" class="btn-shop" style="display: inline-block; margin-top: 1rem;">
                Start Shopping
            </a>
        </div>
        
        <div id="cartSummary" class="cart-summary">
            <div class="cart-total" id="cartTotal">Total: $ 0.00</div>
            <div class="cart-actions">
                <button class="btn-buy" id="checkoutBtn">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </div>
</body>
</html>
