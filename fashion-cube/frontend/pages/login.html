<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FASHION CUBE</title>
</head>
<body>
    <div id="login" class="page">
        <div class="auth-container">
            <div class="auth-box">
                <h2>Sign In</h2>
                <p class="auth-subtitle">Welcome back to FASHION CUBE</p>
                
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label for="loginEmail">Email Address</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" value="demo@user.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" value="demo123" required>
                    </div>
                    
                    <button type="submit" class="btn-auth">Sign In</button>
                </form>
                
                <div class="auth-footer">
                    <p>Don't have an account? <a href="#" onclick="window.navigateTo('register')">Sign Up</a></p>
                </div>
                
                <div class="auth-demo">
                    <p><small>Demo: demo@user.com / demo123</small></p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .auth-container {
            max-width: 420px;
            margin: 3rem auto;
            padding: 1rem;
        }
        
        .auth-box {
            background: white;
            border-radius: 40px;
            padding: 2.5rem;
            border: 1px solid #eee;
        }
        
        .auth-box h2 {
            text-align: center;
            color: #1e1e1e;
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 1rem;
            transition: 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #a37b6b;
        }
        
        .btn-auth {
            width: 100%;
            padding: 0.9rem;
            background: #1e1e1e;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-auth:hover {
            background: #3a2e28;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        
        .auth-footer a {
            color: #a37b6b;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
        
        .auth-demo {
            text-align: center;
            margin-top: 1rem;
            color: #999;
        }
    </style>

    <script>
        async function handleLogin(e) {
            e.preventDefault();
            
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value.trim();
            
            if (!email || !password) {
                window.showToast('⚠️ Please fill in all fields');
                return;
            }
            
            try {
                const data = await API.AuthAPI.login(email, password);
                API.setAuthToken(data.token);
                API.setCurrentUser(data.user);
                window.isLoggedIn = true;
                window.currentUser = data.user;
                
                window.updateUserDisplay();
                await window.loadUserData();
                window.showToast(`👋 Welcome back ${data.user.name}!`);
                window.navigateTo('home');
            } catch (error) {
                window.showToast(`❌ ${error.message}`);
            }
        }
    </script>
</body>
</html>
