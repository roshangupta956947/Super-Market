<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist - FASHION CUBE</title>
</head>
<body>
    <div id="wishlist" class="page">
        <button class="btn-back" id="wishlistBack">
            <i class="fas fa-arrow-left"></i> Back to shop
        </button>
        <h2 style="margin: 1rem 0;">❤️ My Wishlist</h2>
        
        <div id="wishlistItems" class="product-grid">
            <!-- Generated by JS -->
        </div>
        <div id="wishlistEmpty" style="text-align: center; padding: 3rem; color: #999;">
            Your wishlist is empty. Start adding items!
            <br>
            <a href="#" data-page="products" class="btn-shop" style="display: inline-block; margin-top: 1rem;">
                Browse Products
            </a>
        </div>
    </div>

    <script>
        // Back button functionality
        document.getElementById('wishlistBack')?.addEventListener('click', () => {
            window.navigateTo('home');
        });
    </script>
</body>
</html>
