<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - FASHION CUBE</title>
</head>
<body>
    <div id="products" class="page">
        <div class="section-head">
            <h3>All Products</h3>
            <div class="section-controls">
                <button class="btn-filter-toggle" id="filterToggle">
                    <i class="fas fa-sliders-h"></i> Filters
                </button>
                <select class="sort-select" id="sortSelect">
                    <option value="popular">Most Popular</option>
                    <option value="price-low">Price: Low to High</option>
                    <option value="price-high">Price: High to Low</option>
                    <option value="newest">Newest First</option>
                    <option value="rating">Highest Rated</option>
                </select>
            </div>
        </div>

        <!-- Filter Panel -->
        <div class="filter-panel" id="filterPanel">
            <h4><i class="fas fa-filter"></i> Filter Products</h4>
            <div class="filter-row">
                <div class="filter-group">
                    <label>Category</label>
                    <select id="filterCategory">
                        <option value="all">All Categories</option>
                        <!-- Populated by JS -->
                    </select>
                </div>
                <div class="filter-group">
                    <label>Min Price ($)</label>
                    <input type="number" id="filterMinPrice" placeholder="0" min="0">
                </div>
                <div class="filter-group">
                    <label>Max Price ($)</label>
                    <input type="number" id="filterMaxPrice" placeholder="200" min="0">
                </div>
                <div class="filter-group">
                    <label>Min Rating</label>
                    <select id="filterRating">
                        <option value="0">Any Rating</option>
                        <option value="4">4+ Stars</option>
                        <option value="4.5">4.5+ Stars</option>
                        <option value="4.8">4.8+ Stars</option>
                    </select>
                </div>
            </div>
            <div class="filter-actions">
                <button class="btn-apply-filter" id="applyFilters">Apply Filters</button>
                <button class="btn-reset-filter" id="resetFilters">Reset</button>
            </div>
        </div>

        <div class="product-grid" id="productGrid">
            <!-- Generated by JS -->
        </div>
        <div class="pagination" id="pagination">
            <!-- Generated by JS -->
        </div>
    </div>
</body>
</html>
