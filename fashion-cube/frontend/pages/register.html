<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FASHION CUBE</title>
</head>
<body>
    <div id="register" class="page">
        <div class="auth-container">
            <div class="auth-box">
                <h2>Create Account</h2>
                <p class="auth-subtitle">Join FASHION CUBE today</p>
                
                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label for="registerName">Full Name</label>
                        <input type="text" id="registerName" placeholder="Enter your full name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="registerEmail">Email Address</label>
                        <input type="email" id="registerEmail" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <input type="password" id="registerPassword" placeholder="Create a password (min 6 characters)" minlength="6" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="registerPhone">Phone Number (Optional)</label>
                        <input type="tel" id="registerPhone" placeholder="+91 98765 43210">
                    </div>
                    
                    <div class="form-group">
                        <label for="registerAddress">Address (Optional)</label>
                        <input type="text" id="registerAddress" placeholder="Your delivery address">
                    </div>
                    
                    <button type="submit" class="btn-auth">Create Account</button>
                </form>
                
                <div class="auth-footer">
                    <p>Already have an account? <a href="#" onclick="window.navigateTo('login')">Sign In</a></p>
                </div>
            </div>
        </div>
    </div>

    <style>
        .auth-container {
            max-width: 420px;
            margin: 3rem auto;
            padding: 1rem;
        }
        
        .auth-box {
            background: white;
            border-radius: 40px;
            padding: 2.5rem;
            border: 1px solid #eee;
        }
        
        .auth-box h2 {
            text-align: center;
            color: #1e1e1e;
            margin-bottom: 0.5rem;
        }
        
        .auth-subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 2rem;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: #555;
        }
        
        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ddd;
            border-radius: 16px;
            font-size: 1rem;
            transition: 0.2s;
        }
        
        .form-group input:focus {
            outline: none;
            border-color: #a37b6b;
        }
        
        .btn-auth {
            width: 100%;
            padding: 0.9rem;
            background: #1e1e1e;
            color: white;
            border: none;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.2s;
        }
        
        .btn-auth:hover {
            background: #3a2e28;
        }
        
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            color: #666;
        }
        
        .auth-footer a {
            color: #a37b6b;
            font-weight: 600;
        }
        
        .auth-footer a:hover {
            text-decoration: underline;
        }
    </style>

    <script>
        async function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('registerName').value.trim();
            const email = document.getElementById('registerEmail').value.trim();
            const password = document.getElementById('registerPassword').value.trim();
            const phone = document.getElementById('registerPhone').value.trim();
            const address = document.getElementById('registerAddress').value.trim();
            
            if (!name || !email || !password) {
                window.showToast('⚠️ Please fill in all required fields');
                return;
            }
            
            if (password.length < 6) {
                window.showToast('⚠️ Password must be at least 6 characters');
                return;
            }
            
            try {
                const data = await API.AuthAPI.register({ name, email, password, phone, address });
                API.setAuthToken(data.token);
                API.setCurrentUser(data.user);
                window.isLoggedIn = true;
                window.currentUser = data.user;
                
                window.updateUserDisplay();
                await window.loadUserData();
                window.showToast(`🎉 Welcome ${data.user.name}! Account created.`);
                window.navigateTo('home');
            } catch (error) {
                window.showToast(`❌ ${error.message}`);
            }
        }
    </script>
</body>
</html>
